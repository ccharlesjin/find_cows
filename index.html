<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找牛谜题求解器</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }
    .wrap { max-width: 800px; margin: 0 auto; padding: 24px 20px; }
    h1 { margin: 0 0 6px; font-size: 24px; text-align: center; }
    .sub { color: #6b7280; font-size: 13px; text-align: center; margin-bottom: 20px; }
    .toolbar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      background: #fff; border-radius: 16px; padding: 14px 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 16px;
    }
    .toolbar label { font-size: 13px; font-weight: 600; color: #374151; white-space: nowrap; }
    .toolbar input[type="number"] {
      width: 60px; border: 1px solid #d1d5db; border-radius: 10px;
      padding: 8px 10px; font-size: 14px; text-align: center;
    }
    .toolbar input[type="file"] { font-size: 13px; min-width: 0; flex: 1; }
    .toolbar .spacer { flex: 1; }
    button {
      border: 0; border-radius: 12px; padding: 10px 20px; font-size: 14px;
      font-weight: 700; cursor: pointer; transition: transform .05s, opacity .15s;
    }
    button:hover { opacity: .9; }
    button:active { transform: translateY(1px); }
    .primary { background: #2563eb; color: #fff; }
    .secondary { background: #e5e7eb; color: #111827; }
    .board-card {
      background: #fff; border-radius: 20px; padding: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .board-wrap {
      overflow: auto; border-radius: 14px; background: #f1f5f9;
      padding: 10px; border: 1px solid #e2e8f0; user-select: none;
    }
    .board {
      display: grid; gap: 2px; width: max-content; margin: 0 auto;
      background: #94a3b8; padding: 2px; border-radius: 10px;
    }
    .cell {
      position: relative; background: #fff; display: flex;
      align-items: center; justify-content: center;
      border-radius: 3px; overflow: hidden;
    }
    .cell .rid {
      position: absolute; left: 3px; top: 1px;
      font-size: 9px; font-weight: 800; opacity: .45; pointer-events: none;
    }
    .cell .cow { font-size: 24px; line-height: 1; filter: drop-shadow(0 1px 0 rgba(255,255,255,.5)); }
    .status {
      margin-top: 14px; border-radius: 14px; padding: 12px 16px;
      font-size: 14px; line-height: 1.6; text-align: center;
    }
    .status.ok { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .status.err { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .status.info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; }
    .stats {
      display: flex; justify-content: center; gap: 24px;
      margin-top: 10px; font-size: 13px; color: #6b7280;
    }
    .stats b { color: #1f2937; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>找牛谜题求解器</h1>
  <div class="sub">上传游戏截图，自动识别棋盘分区并求解。规则：每行/列/区块各 K 头牛，牛不相邻（含对角线）。</div>

  <div class="toolbar">
    <label for="sizeInput">棋盘 N×N</label>
    <input id="sizeInput" type="number" min="5" max="14" value="8" />
    <select id="modeSelect" style="border:1px solid #d1d5db;border-radius:10px;padding:8px 10px;font-size:14px;font-weight:600;">
      <option value="1">单牛</option>
      <option value="2" selected>双牛</option>
    </select>
    <input id="imageUpload" type="file" accept="image/*" />
    <button class="primary" id="solveBtn">识别并求解</button>
    <button class="secondary" id="clearBtn">清除</button>
  </div>

  <div class="board-card">
    <div class="board-wrap">
      <div id="board" class="board"></div>
    </div>
    <div id="status" class="status info">上传游戏截图后点击「识别并求解」。</div>
    <div class="stats">
      <span>棋盘 <b id="statSize">8×8</b></span>
      <span>区块 <b id="statRegions">0</b></span>
      <span>总牛 <b id="statTarget">16</b></span>
    </div>
  </div>
</div>

<script>
const CROP_TOP = 0.32, CROP_LEFT = 0.105, CROP_WIDTH = 0.785;
const TOLERANCE = 3, INSET = 0.26;
function cowsPerUnit() { return parseInt(document.getElementById('modeSelect').value, 10); }

const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');
const sizeInput = document.getElementById('sizeInput');
const imageUpload = document.getElementById('imageUpload');

let N = 8, cellSize = 52;
let regionGrid = [], solution = [], regionCount = 0, regionColors = new Map();
let uploadedImage = null;

const palette = [
  '#f6d365','#fda085','#fbc2eb','#a1c4fd','#c2e9fb','#d4fc79',
  '#96e6a1','#84fab0','#8fd3f4','#a6c1ee','#f9d423','#ffb199',
  '#c471ed','#12c2e9','#90f7ec','#b8e986','#f8cdda','#c6ffdd',
  '#d299c2','#89f7fe','#b7f8db','#d9afd9','#cfd9df','#e2ebf0'
];

// ==================== Color Utilities ====================

function rgbToLab(r, g, b) {
  let rl = r / 255, gl = g / 255, bl = b / 255;
  rl = rl > 0.04045 ? Math.pow((rl + 0.055) / 1.055, 2.4) : rl / 12.92;
  gl = gl > 0.04045 ? Math.pow((gl + 0.055) / 1.055, 2.4) : gl / 12.92;
  bl = bl > 0.04045 ? Math.pow((bl + 0.055) / 1.055, 2.4) : bl / 12.92;
  let x = rl * 0.4124564 + gl * 0.3575761 + bl * 0.1804375;
  let y = rl * 0.2126729 + gl * 0.7151522 + bl * 0.0721750;
  let z = rl * 0.0193339 + gl * 0.1191920 + bl * 0.9503041;
  x /= 0.95047; y /= 1.00000; z /= 1.08883;
  const e = 0.008856, k = 903.3;
  x = x > e ? Math.cbrt(x) : (k * x + 16) / 116;
  y = y > e ? Math.cbrt(y) : (k * y + 16) / 116;
  z = z > e ? Math.cbrt(z) : (k * z + 16) / 116;
  return [116 * y - 16, 500 * (x - y), 200 * (y - z)];
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function ciede2000(lab1, lab2) {
  const [L1, a1, b1] = lab1, [L2, a2, b2] = lab2;
  const rad = Math.PI / 180, deg = 180 / Math.PI;
  const C1 = Math.sqrt(a1 * a1 + b1 * b1), C2 = Math.sqrt(a2 * a2 + b2 * b2);
  const Cab = (C1 + C2) / 2, Cab7 = Math.pow(Cab, 7);
  const G = 0.5 * (1 - Math.sqrt(Cab7 / (Cab7 + 6103515625)));
  const a1p = a1 * (1 + G), a2p = a2 * (1 + G);
  const C1p = Math.sqrt(a1p * a1p + b1 * b1), C2p = Math.sqrt(a2p * a2p + b2 * b2);
  let h1p = Math.atan2(b1, a1p) * deg; if (h1p < 0) h1p += 360;
  let h2p = Math.atan2(b2, a2p) * deg; if (h2p < 0) h2p += 360;
  const dLp = L2 - L1, dCp = C2p - C1p;
  let dhp;
  if (C1p * C2p === 0) dhp = 0;
  else if (Math.abs(h2p - h1p) <= 180) dhp = h2p - h1p;
  else if (h2p - h1p > 180) dhp = h2p - h1p - 360;
  else dhp = h2p - h1p + 360;
  const dHp = 2 * Math.sqrt(C1p * C2p) * Math.sin(dhp / 2 * rad);
  const Lp = (L1 + L2) / 2, Cp = (C1p + C2p) / 2;
  let hp;
  if (C1p * C2p === 0) hp = h1p + h2p;
  else if (Math.abs(h1p - h2p) <= 180) hp = (h1p + h2p) / 2;
  else if (h1p + h2p < 360) hp = (h1p + h2p + 360) / 2;
  else hp = (h1p + h2p - 360) / 2;
  const T = 1 - 0.17 * Math.cos((hp - 30) * rad) + 0.24 * Math.cos(2 * hp * rad)
    + 0.32 * Math.cos((3 * hp + 6) * rad) - 0.20 * Math.cos((4 * hp - 63) * rad);
  const Lpm50sq = (Lp - 50) * (Lp - 50);
  const SL = 1 + 0.015 * Lpm50sq / Math.sqrt(20 + Lpm50sq);
  const SC = 1 + 0.045 * Cp, SH = 1 + 0.015 * Cp * T;
  const Cp7 = Math.pow(Cp, 7), RC = 2 * Math.sqrt(Cp7 / (Cp7 + 6103515625));
  const dtheta = 30 * Math.exp(-((hp - 275) / 25) * ((hp - 275) / 25));
  const RT = -Math.sin(2 * dtheta * rad) * RC;
  const vL = dLp / SL, vC = dCp / SC, vH = dHp / SH;
  return Math.sqrt(vL * vL + vC * vC + vH * vH + RT * vC * vH);
}

// ==================== Image Processing ====================

function getImageData(img) {
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  const ctx = c.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(img, 0, 0);
  return ctx.getImageData(0, 0, c.width, c.height);
}

function medianPatch(data, width, x0, y0, x1, y1) {
  const rs = [], gs = [], bs = [];
  for (let y = Math.max(0, Math.floor(y0)); y <= Math.floor(y1); y++) {
    for (let x = Math.max(0, Math.floor(x0)); x <= Math.floor(x1); x++) {
      const i = (y * width + x) * 4;
      if (data[i + 3] < 10) continue;
      rs.push(data[i]); gs.push(data[i + 1]); bs.push(data[i + 2]);
    }
  }
  if (!rs.length) return [255, 255, 255];
  rs.sort((a, b) => a - b); gs.sort((a, b) => a - b); bs.sort((a, b) => a - b);
  const m = rs.length >> 1;
  return [rs[m], gs[m], bs[m]];
}

function getCropBox(img) {
  const w = Math.round(img.width * CROP_WIDTH);
  return { x: Math.round(img.width * CROP_LEFT), y: Math.round(img.height * CROP_TOP), w, h: w };
}

// ==================== Region Detection ====================

function clusterColors(labColors, threshold) {
  const n = labColors.length;
  const dist = Array.from({ length: n }, () => new Float32Array(n));
  for (let i = 0; i < n; i++)
    for (let j = i + 1; j < n; j++) {
      const d = ciede2000(labColors[i], labColors[j]);
      dist[i][j] = d; dist[j][i] = d;
    }

  const cid = new Int32Array(n);
  for (let i = 0; i < n; i++) cid[i] = i;

  while (true) {
    const members = new Map();
    for (let i = 0; i < n; i++) {
      if (!members.has(cid[i])) members.set(cid[i], []);
      members.get(cid[i]).push(i);
    }
    const ids = [...members.keys()];
    if (ids.length <= 1) break;

    let minD = Infinity, m1 = -1, m2 = -1;
    for (let a = 0; a < ids.length; a++)
      for (let b = a + 1; b < ids.length; b++) {
        const ma = members.get(ids[a]), mb = members.get(ids[b]);
        let sum = 0;
        for (const i of ma) for (const j of mb) sum += dist[i][j];
        const avg = sum / (ma.length * mb.length);
        if (avg < minD) { minD = avg; m1 = ids[a]; m2 = ids[b]; }
      }
    if (minD > threshold) break;
    for (let i = 0; i < n; i++) if (cid[i] === m2) cid[i] = m1;
  }

  const remap = new Map(); let next = 0;
  const result = new Array(n);
  for (let i = 0; i < n; i++) {
    if (!remap.has(cid[i])) remap.set(cid[i], next++);
    result[i] = remap.get(cid[i]);
  }
  return { clusters: result, numClusters: next };
}

function buildRegions(clusterIds) {
  const total = N * N;
  const rid = new Int32Array(total).fill(-1);
  let next = 0;
  for (let idx = 0; idx < total; idx++) {
    if (rid[idx] >= 0) continue;
    const c = clusterIds[idx], id = next++;
    const q = [idx]; rid[idx] = id;
    while (q.length) {
      const cur = q.shift(), cr = Math.floor(cur / N), cc = cur % N;
      for (const [nr, nc] of [[cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]]) {
        if (nr < 0 || nr >= N || nc < 0 || nc >= N) continue;
        const ni = nr * N + nc;
        if (rid[ni] >= 0 || clusterIds[ni] !== c) continue;
        rid[ni] = id; q.push(ni);
      }
    }
  }
  return { regionOf: rid, numRegions: next };
}

function mergeSmall(regionOf, labColors, maxDist) {
  const total = N * N;
  const members = new Map();
  for (let i = 0; i < total; i++) {
    if (!members.has(regionOf[i])) members.set(regionOf[i], []);
    members.get(regionOf[i]).push(i);
  }
  for (const [rid, cells] of members) {
    if (cells.length >= 2) continue;
    const avg = [0, 0, 0];
    for (const c of cells) { avg[0] += labColors[c][0]; avg[1] += labColors[c][1]; avg[2] += labColors[c][2]; }
    avg[0] /= cells.length; avg[1] /= cells.length; avg[2] /= cells.length;
    const nbrs = new Set();
    for (const c of cells) {
      const cr = Math.floor(c / N), cc = c % N;
      for (const [nr, nc] of [[cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]]) {
        if (nr < 0 || nr >= N || nc < 0 || nc >= N) continue;
        const nrid = regionOf[nr * N + nc];
        if (nrid !== rid) nbrs.add(nrid);
      }
    }
    let bestR = -1, bestD = Infinity;
    for (const nrid of nbrs) {
      const nc = members.get(nrid); if (!nc) continue;
      const na = [0, 0, 0];
      for (const c of nc) { na[0] += labColors[c][0]; na[1] += labColors[c][1]; na[2] += labColors[c][2]; }
      na[0] /= nc.length; na[1] /= nc.length; na[2] /= nc.length;
      const d = ciede2000(avg, na);
      if (d < bestD) { bestD = d; bestR = nrid; }
    }
    if (bestR >= 0 && bestD <= maxDist) {
      for (const c of cells) regionOf[c] = bestR;
      if (members.has(bestR)) members.get(bestR).push(...cells);
      members.delete(rid);
    }
  }
  const remap = new Map(); let next = 0;
  for (let i = 0; i < total; i++) {
    if (!remap.has(regionOf[i])) remap.set(regionOf[i], next++);
    regionOf[i] = remap.get(regionOf[i]);
  }
  return next;
}

// ==================== Solver ====================

function solve() {
  const cells = [], rOf = [];
  const rowC = Array.from({ length: N }, () => []);
  const colC = Array.from({ length: N }, () => []);
  const regC = Array.from({ length: regionCount }, () => []);
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    const i = cells.length; cells.push([r, c]);
    const reg = regionGrid[r][c]; rOf.push(reg);
    rowC[r].push(i); colC[c].push(i); regC[reg].push(i);
  }
  const adj = Array.from({ length: cells.length }, () => []);
  for (let i = 0; i < cells.length; i++) {
    const [r, c] = cells[i];
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      if (!dr && !dc) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < N && nc >= 0 && nc < N) adj[i].push(nr * N + nc);
    }
  }
  const K = cowsPerUnit();
  const rc = Array(N).fill(0), cc = Array(N).fill(0), gc = Array(regionCount).fill(0);
  const a = Array(cells.length).fill(-1);
  const units = [];
  for (let r = 0; r < N; r++) units.push(rowC[r]);
  for (let c = 0; c < N; c++) units.push(colC[c]);
  for (let k = 0; k < regionCount; k++) units.push(regC[k]);

  function cnt(i) { const [r, c] = cells[i]; return [rc[r], cc[c], gc[rOf[i]]]; }
  function canPlace(i) {
    const [rv, cv, gv] = cnt(i);
    if (rv >= K || cv >= K || gv >= K) return false;
    for (const nb of adj[i]) if (a[nb] === 1) return false;
    return true;
  }
  function set(i, v, t) {
    if (a[i] === v) return true; if (a[i] !== -1) return false;
    a[i] = v; t.push(i);
    if (v === 1) {
      const [r, c] = cells[i]; rc[r]++; cc[c]++; gc[rOf[i]]++;
      t.push(['c', r, c, rOf[i]]);
      if (rc[r] > K || cc[c] > K || gc[rOf[i]] > K) return false;
      for (const nb of adj[i]) if (a[nb] === 1) return false;
    }
    return true;
  }
  function undo(t) {
    for (let i = t.length - 1; i >= 0; i--) {
      const x = t[i];
      if (Array.isArray(x)) { rc[x[1]]--; cc[x[2]]--; gc[x[3]]--; }
      else a[x] = -1;
    }
  }
  function ustat(u) {
    let p = 0, un = 0;
    for (const i of u) { if (a[i] === 1) p++; else if (a[i] === -1) un++; }
    return { p, un, need: K - p };
  }
  function feasible() {
    for (const u of units) { const s = ustat(u); if (s.p > K || s.p + s.un < K) return false; }
    return true;
  }
  function propagate() {
    const t = []; let changed = true;
    while (changed) {
      changed = false;
      if (!feasible()) { undo(t); return null; }
      for (const u of units) {
        const s = ustat(u);
        if (s.need === 0) {
          for (const i of u) if (a[i] === -1) { if (!set(i, 0, t)) { undo(t); return null; } changed = true; }
        } else if (s.need === s.un) {
          for (const i of u) if (a[i] === -1) { if (!canPlace(i) || !set(i, 1, t)) { undo(t); return null; } changed = true; }
        }
      }
      for (let i = 0; i < cells.length; i++) {
        if (a[i] !== -1) continue;
        if (!canPlace(i)) { if (!set(i, 0, t)) { undo(t); return null; } changed = true; }
      }
    }
    return t;
  }
  function pick() {
    let best = -1, bs = -Infinity;
    for (let i = 0; i < cells.length; i++) {
      if (a[i] !== -1) continue;
      const [r, c] = cells[i];
      const s = (K - rc[r]) + (K - cc[c]) + (K - gc[rOf[i]]) - adj[i].filter(n => a[n] === -1).length * 0.01;
      if (s > bs) { bs = s; best = i; }
    }
    return best;
  }
  function dfs() {
    const pt = propagate(); if (!pt) return false;
    if (units.every(u => ustat(u).p === K)) return true;
    const i = pick(); if (i < 0) { undo(pt); return false; }
    for (const v of (canPlace(i) ? [1, 0] : [0])) {
      const t = [];
      if ((v === 0 || canPlace(i)) && set(i, v, t) && dfs()) return true;
      undo(t);
    }
    undo(pt); return false;
  }

  if (!dfs()) return false;
  solution = Array.from({ length: N }, () => Array(N).fill(false));
  for (let i = 0; i < cells.length; i++) if (a[i] === 1) { const [r, c] = cells[i]; solution[r][c] = true; }
  return true;
}

// ==================== Rendering ====================

function renderBoard() {
  boardEl.innerHTML = '';
  cellSize = Math.min(56, Math.floor(Math.min(720, window.innerWidth - 80) / N));
  boardEl.style.gridTemplateColumns = `repeat(${N}, ${cellSize}px)`;
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    const el = document.createElement('div');
    el.className = 'cell';
    el.style.width = el.style.height = cellSize + 'px';
    const id = regionGrid[r]?.[c];
    el.style.background = id >= 0 ? (regionColors.get(id) || palette[id % palette.length]) : '#fff';
    if (id >= 0) {
      const tag = document.createElement('div');
      tag.className = 'rid'; tag.textContent = id + 1;
      el.appendChild(tag);
    }
    if (solution[r]?.[c]) {
      const cow = document.createElement('div');
      cow.className = 'cow'; cow.textContent = '🐮';
      el.appendChild(cow);
    }
    boardEl.appendChild(el);
  }
}

function updateStats() {
  document.getElementById('statSize').textContent = `${N}×${N}`;
  document.getElementById('statRegions').textContent = new Set(regionGrid.flat().filter(v => v >= 0)).size;
  document.getElementById('statTarget').textContent = N * cowsPerUnit();
}

function setStatus(html, type) { statusEl.className = `status ${type}`; statusEl.innerHTML = html; }

// ==================== Main Flow ====================

function detectAndSolve() {
  if (!uploadedImage) { setStatus('请先上传截图。', 'err'); return; }

  N = Math.max(5, Math.min(14, parseInt(sizeInput.value, 10) || 8));
  sizeInput.value = N;

  const box = getCropBox(uploadedImage);
  const { data, width } = getImageData(uploadedImage);
  const cellW = box.w / N, cellH = box.h / N;

  const rgbSamples = [], labSamples = [];
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    const x0 = box.x + c * cellW + cellW * INSET;
    const y0 = box.y + r * cellH + cellH * INSET;
    const x1 = box.x + (c + 1) * cellW - cellW * INSET;
    const y1 = box.y + (r + 1) * cellH - cellH * INSET;
    const rgb = medianPatch(data, width, x0, y0, x1, y1);
    rgbSamples.push(rgb);
    labSamples.push(rgbToLab(rgb[0], rgb[1], rgb[2]));
  }

  const { clusters, numClusters } = clusterColors(labSamples, TOLERANCE);
  const { regionOf } = buildRegions(clusters);
  const finalCount = mergeSmall(regionOf, labSamples, TOLERANCE);

  regionGrid = Array.from({ length: N }, (_, r) => Array.from({ length: N }, (_, c) => regionOf[r * N + c]));
  solution = Array.from({ length: N }, () => Array(N).fill(false));
  regionCount = finalCount;

  regionColors = new Map();
  const sums = new Map(), cnts = new Map();
  for (let i = 0; i < N * N; i++) {
    const rid = regionOf[i];
    if (!sums.has(rid)) { sums.set(rid, [0,0,0]); cnts.set(rid, 0); }
    const s = sums.get(rid);
    s[0] += rgbSamples[i][0]; s[1] += rgbSamples[i][1]; s[2] += rgbSamples[i][2];
    cnts.set(rid, cnts.get(rid) + 1);
  }
  for (const [rid, s] of sums) {
    const n = cnts.get(rid);
    const [r, g, b] = [Math.round(s[0]/n), Math.round(s[1]/n), Math.round(s[2]/n)];
    const gray = 0.299*r + 0.587*g + 0.114*b;
    regionColors.set(rid, rgbToHex(
      Math.max(0, Math.min(255, Math.round(gray + (r - gray) * 1.3))),
      Math.max(0, Math.min(255, Math.round(gray + (g - gray) * 1.3))),
      Math.max(0, Math.min(255, Math.round(gray + (b - gray) * 1.3)))
    ));
  }

  // Fill unassigned cells as individual regions
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    if (regionGrid[r][c] < 0) regionGrid[r][c] = regionCount++;
  }

  renderBoard(); updateStats();

  // Validate
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    if (regionGrid[r][c] < 0) {
      setStatus('存在未分配格子，无法求解。', 'err'); return;
    }
  }

  setStatus('识别完成，正在求解…', 'info');
  setTimeout(() => {
    if (solve()) {
      renderBoard();
      setStatus(`求解成功！${finalCount} 个区块，每行/列/区块各 ${cowsPerUnit()} 头牛，共 ${N * cowsPerUnit()} 头。`, 'ok');
    } else {
      renderBoard();
      setStatus(`未找到可行解（识别到 ${finalCount} 个区块）。可能识别有误，请检查截图或调整 N。`, 'err');
    }
  }, 50);
}

function clearAll() {
  regionGrid = Array.from({ length: N }, () => Array(N).fill(-1));
  solution = Array.from({ length: N }, () => Array(N).fill(false));
  regionCount = 0; regionColors = new Map();
  renderBoard(); updateStats();
  setStatus('已清除，可重新上传截图。', 'info');
}

function loadImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => { const img = new Image(); img.onload = () => resolve(img); img.onerror = reject; img.src = reader.result; };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ==================== Events ====================

document.getElementById('solveBtn').addEventListener('click', detectAndSolve);
document.getElementById('clearBtn').addEventListener('click', clearAll);
imageUpload.addEventListener('change', async (e) => {
  const file = e.target.files?.[0]; if (!file) return;
  try {
    uploadedImage = await loadImage(file);
    setStatus('截图已载入，点击「识别并求解」开始。', 'info');
  } catch { setStatus('图片读取失败。', 'err'); }
});
sizeInput.addEventListener('change', () => {
  N = Math.max(5, Math.min(14, parseInt(sizeInput.value, 10) || 8));
  sizeInput.value = N; updateStats();
});
document.getElementById('modeSelect').addEventListener('change', updateStats);

// Init
regionGrid = Array.from({ length: N }, () => Array(N).fill(-1));
solution = Array.from({ length: N }, () => Array(N).fill(false));
renderBoard(); updateStats();
</script>
